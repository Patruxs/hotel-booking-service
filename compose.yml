services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotel_booking_service
      POSTGRES_USER: hotel_booking
      POSTGRES_PASSWORD: hotel_booking
    ports:
      - "5432:5432"
    volumes:
      - hotel_booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_booking -d hotel_booking_service"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hotel_booking_postgres_data:
