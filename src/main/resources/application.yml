server:
  port: 8080

spring:
  application:
    name: hotel-booking-service
  profiles:
    active: @spring.profiles.active@
  datasource:
    url: ${LOCAL_DB_URL:${DEV_DB_URL:jdbc:postgresql://localhost:5432/hotel_booking_service}}
    username: ${LOCAL_DB_USER:${DEV_DB_USER:hotel_booking}}
    password: ${LOCAL_DB_PASSWORD:${DEV_DB_PASSWORD:hotel_booking}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

app:
  frontend:
    payment-result-url: ${FRONTEND_PAYMENT_RESULT_URL:http://localhost:5173/payment-result}
  vnpay:
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    tmn-code: ${VNPAY_TMN_CODE:DEMO}
    hash-secret: ${VNPAY_HASH_SECRET:DEMO_SECRET}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return}
