server:
  port: 8080

spring:
  application:
    name: hotel-booking-service
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:64MB}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${LOCAL_DB_URL:${DEV_DB_URL:jdbc:postgresql://localhost:5432/hotel_booking_service}}
    username: ${LOCAL_DB_USER:${DEV_DB_USER:hotel_booking}}
    password: ${LOCAL_DB_PASSWORD:${DEV_DB_PASSWORD:hotel_booking}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

app:
  upload:
    mode: ${APP_UPLOAD_MODE:LOCAL}
    max-image-count: ${APP_UPLOAD_MAX_IMAGE_COUNT:12}
  frontend:
    payment-result-url: ${FRONTEND_PAYMENT_RESULT_URL:http://localhost:5173/payment-result}
  vnpay:
    enabled: ${VNPAY_ENABLED:false}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    tmn-code: ${VNPAY_TMN_CODE:DEMO}
    hash-secret: ${VNPAY_HASH_SECRET:DEMO_SECRET}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay/return}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
