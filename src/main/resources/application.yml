server:
  port: 8080

spring:
  application:
    name: hotel-booking-service
  profiles:
    active: @spring.profiles.active@

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    root: INFO
    web: INFO

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000