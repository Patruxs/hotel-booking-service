# ==============================================================================
# 🚀 CI/CD Pipeline - Hotel Booking Service
# ==============================================================================
# Automated pipeline: Test → Build Docker Image → Push Docker Hub → Deploy to AWS EC2
#
# Workflow:
#   Push/PR to main → [Test] → [Build & Push Image] → [Deploy to AWS]
#
# Requirements: Configure GitHub Secrets (see README or INFRASTRUCTURE_ANALYSIS.md)
# ==============================================================================

name: 🏨 Hotel Booking - CI/CD Pipeline

# ==============================================================================
# 📌 Trigger: When does the pipeline run?
# ==============================================================================
on:
  push:
    branches: [main]          # Run when pushing to main branch
    paths:                     # Only run when code changes (skip docs)
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]          # Run when creating PR to main (test only, NO deploy)

# ==============================================================================
# 🔧 Shared environment variables
# ==============================================================================
env:
  DOCKER_IMAGE: patruxs/hotel-booking-backend         # Docker Hub image name
  JAVA_VERSION: '21'                                    # Java version
  JAVA_DISTRIBUTION: 'temurin'                          # Java distribution (Eclipse Temurin)

# ==============================================================================
# 📋 Pipeline Jobs
# ==============================================================================
jobs:

  # ============================================================================
  # 🧪 Stage 1: TEST - Run Unit Tests & Verify code
  # ============================================================================
  # Purpose: Ensure code has no errors before building and deploying
  # Runs on: Push or Pull Request
  # ============================================================================
  test:
    name: 🧪 Test & Verify
    runs-on: ubuntu-latest

    steps:
      # ----- Step 1: Checkout code from repository -----
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ----- Step 2: Setup Java 21 (Temurin) + Cache Maven -----
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven        # Cache Maven dependencies → faster builds from 2nd run

      # ----- Step 3: Run Unit Tests -----
      # -B = batch mode (non-interactive, suitable for CI)
      # --fail-at-end = run all tests before failing (instead of stopping at first failure)
      - name: 🧪 Run Unit Tests
        run: mvn test -B --fail-at-end

      # ----- Step 4: Verify build (compile + test + package) -----
      # Ensure the project builds successfully
      - name: 🔨 Verify Build
        run: mvn verify -B -DskipTests

      # ----- Step 5: Upload test results (even if tests fail → still upload for debugging) -----
      - name: 📊 Upload Test Results
        if: always()          # Always run, even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7   # Retain for 7 days

  # ============================================================================
  # 🐳 Stage 2: BUILD & PUSH - Build Docker Image and Push to Docker Hub
  # ============================================================================
  # Purpose: Package the application into a Docker image and push to registry
  # Runs on: Only when pushing to main (NOT on PR)
  # Depends on: Stage 1 (test) must PASS
  # ============================================================================
  build:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                                       # Wait for test to PASS
    if: github.event_name == 'push'                   # Only build on push (not PR)

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}    # Output tag for deploy stage

    steps:
      # ----- Step 1: Checkout code -----
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ----- Step 2: Setup Docker Buildx (optimized build) -----
      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----- Step 3: Login to Docker Hub -----
      # Uses secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----- Step 4: Generate metadata (tags, labels) for Docker image -----
      - name: 🏷️ Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      # ----- Step 5: Build and Push Docker image -----
      # Uses multi-stage Dockerfile (builder → runtime)
      # GitHub Actions cache → faster builds from 2nd run
      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha                        # Cache from GitHub Actions
          cache-to: type=gha,mode=max                 # Save cache for next build

      # ----- Step 6: Display image info -----
      - name: 📋 Image Info
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "📦 Image: ${{ env.DOCKER_IMAGE }}"
          echo "🏷️ Tags:"
          echo "${{ steps.meta.outputs.tags }}"

  # ============================================================================
  # 🚀 Stage 3: DEPLOY - Deploy to AWS EC2 using Ansible
  # ============================================================================
  # Purpose: Automatically deploy new application to 2 EC2 App servers
  # Runs on: Only when build succeeds
  # Depends on: Stage 2 (build) must PASS
  # ============================================================================
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build                                      # Wait for build to PASS
    environment: production                           # GitHub Environment (optional)

    steps:
      # ----- Step 1: Checkout code (need Ansible playbooks) -----
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ----- Step 2: Setup SSH key to connect to EC2 -----
      # Secret EC2_SSH_KEY contains the content of hotel-key.pem file
      - name: 🔐 Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/hotel-key.pem
          chmod 600 ~/.ssh/hotel-key.pem
          # Add SSH config to auto-accept host keys
          cat >> ~/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF
          chmod 600 ~/.ssh/config

      # ----- Step 3: Install Ansible -----
      - name: 📦 Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible

      # ----- Step 4: Create dynamic inventory from secrets -----
      # Instead of hardcoding IPs, use IPs from GitHub Secrets
      - name: 📝 Create Ansible Inventory
        run: |
          cat > /tmp/inventory.ini << EOF
          [app_servers]
          ${{ secrets.APP_EC2_1_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/hotel-key.pem
          ${{ secrets.APP_EC2_2_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/hotel-key.pem

          [monitoring_server]
          ${{ secrets.MONITOR_EC2_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/hotel-key.pem
          EOF

      # ----- Step 5: Deploy Backend + Frontend to 2 App EC2 instances -----
      # Ansible will SSH into each EC2, pull new image, restart containers
      - name: 🚀 Deploy App with Ansible
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i /tmp/inventory.ini deploy-app.yml \
            -e "backend_image=${{ env.DOCKER_IMAGE }}:latest" \
            -e "frontend_image=${{ secrets.FRONTEND_IMAGE }}" \
            -e "rds_endpoint=${{ secrets.RDS_ENDPOINT }}" \
            -e "cloudinary_name=${{ secrets.CLOUDINARY_NAME }}" \
            -e "cloudinary_key=${{ secrets.CLOUDINARY_KEY }}" \
            -e "cloudinary_secret=${{ secrets.CLOUDINARY_SECRET }}"

      # ----- Step 6: Wait for application startup -----
      - name: ⏳ Wait for Application Startup
        run: sleep 45          # Spring Boot needs ~30-45 seconds to start

      # ----- Step 7: Health Check via ALB -----
      # Verify backend health endpoint through ALB
      - name: 🏥 Health Check - Backend
        run: |
          echo "🔍 Checking Backend health via ALB..."
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ secrets.ALB_DNS }}/actuator/health" \
              --max-time 10) || true

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Backend is healthy! (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "⏳ Attempt $i/5 - HTTP Status: $HTTP_STATUS - Retrying in 15s..."
            sleep 15
          done

          echo "❌ Backend health check failed after 5 attempts!"
          exit 1

      # ----- Step 8: Health Check Frontend -----
      - name: 🏥 Health Check - Frontend
        run: |
          echo "🔍 Checking Frontend via ALB..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.ALB_DNS }}/" \
            --max-time 10) || true

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Frontend is accessible! (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Frontend returned HTTP $HTTP_STATUS (may still be starting)"
          fi

      # ----- Step 9: Deployment result -----
      - name: 📢 Deployment Summary
        if: success()
        run: |
          echo "============================================="
          echo "🎉 DEPLOYMENT SUCCESSFUL!"
          echo "============================================="
          echo ""
          echo "🌐 Website:  http://${{ secrets.ALB_DNS }}"
          echo "🔧 API:      http://${{ secrets.ALB_DNS }}/api"
          echo "❤️ Health:   http://${{ secrets.ALB_DNS }}/actuator/health"
          echo ""
          echo "📊 Grafana:  http://${{ secrets.MONITOR_EC2_IP }}:3000"
          echo "📈 Prometheus: http://${{ secrets.MONITOR_EC2_IP }}:9090"
          echo ""
          echo "🐳 Image:    ${{ env.DOCKER_IMAGE }}:latest"
          echo "📝 Commit:   ${{ github.sha }}"
          echo "👤 Author:   ${{ github.actor }}"
          echo "============================================="

  # ============================================================================
  # 📢 Stage 4: NOTIFY - Pipeline result notification (Optional)
  # ============================================================================
  # Purpose: Notify when deploy succeeds or fails
  # Always runs: Even if previous stages fail
  # ============================================================================
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always() && github.event_name == 'push'       # Always run (only on push)

    steps:
      - name: 📊 Pipeline Result
        run: |
          echo "============================================="
          echo "📋 CI/CD Pipeline Report"
          echo "============================================="
          echo ""
          echo "🔀 Branch:    ${{ github.ref_name }}"
          echo "📝 Commit:    ${{ github.sha }}"
          echo "👤 Author:    ${{ github.actor }}"
          echo "⏰ Time:      $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "📊 Stage Results:"
          echo "  🧪 Test:    ${{ needs.test.result }}"
          echo "  🐳 Build:   ${{ needs.build.result }}"
          echo "  🚀 Deploy:  ${{ needs.deploy.result }}"
          echo ""

          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "🎉 Pipeline completed SUCCESSFULLY!"
          else
            echo "❌ Pipeline FAILED - Check logs above for details"
          fi
          echo "============================================="
